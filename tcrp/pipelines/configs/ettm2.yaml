# ETTm2 — Electricity Transformer Temperature, 15-min granularity
# 69 680 rows  |  train 60% / val 20% / test 20%

dataset: ETTm2
data_root: tcrp/data/raw
univariate: true
target_col: OT

# Model
T: 336           # 84-hour look-back (336 × 15 min)
H: 96            # 24-hour forecast horizon (96 × 15 min)
L: 20
stride: 5
d: 64
periods: [96, 672]   # daily (96 × 15min) and weekly (672 × 15min)
alpha: 5.0
beta: 5.0
lambda1: 0.1
lambda2: 1.0e-4
probabilistic: false

# Training
lr: 1.0e-3
batch_size: 32
max_epochs: 100
early_stopping_patience: 10
lr_patience: 5
lr_factor: 0.5
grad_clip: 1.0
num_workers: 0
seed: 42

# I/O
checkpoint_dir: checkpoints
run_name: ""
