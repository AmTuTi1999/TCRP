# ExchangeRate — 8 daily currency exchange rates
# 7 588 rows  |  train 60% / val 20% / test 20%
# Columns: 0–6 (anonymous currencies) + OT (last column used as univariate target)

dataset: ExchangeRate
data_root: tcrp/data/raw
univariate: true
target_col: null   # last column (OT) by convention

# Model
T: 336           # 336-day (~11 month) look-back
H: 96            # 96-day forecast horizon
L: 20
stride: 5
d: 64
periods: [5, 21]   # weekly (5 trading days) and monthly (~21 trading days)
alpha: 5.0
beta: 5.0
lambda1: 0.05    # lighter alignment weight: exchange rates have weaker periodicity
lambda2: 1.0e-4
probabilistic: false

# Training
lr: 5.0e-4       # lower LR: near-random-walk dynamics benefit from conservative updates
batch_size: 32
max_epochs: 100
early_stopping_patience: 15   # allow more patience: slow convergence expected
lr_patience: 7
lr_factor: 0.5
grad_clip: 1.0
num_workers: 0
seed: 42

# I/O
checkpoint_dir: checkpoints
run_name: ""
